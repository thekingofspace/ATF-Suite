<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
    <meta name="description" content="ATF Suite — open source tools for making your own ATF game." />
    <title>ATF Suite</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div id="app">Loading ATF Suite docs…</div>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({
            startOnLoad: false,
            securityLevel: 'loose',
            theme: 'base',
            flowchart: { curve: 'basis', padding: 18, nodeSpacing: 50, rankSpacing: 60, useMaxWidth: true },
            themeVariables: {
                darkMode: true,
                fontFamily: '"Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, Roboto, sans-serif',
                fontSize: '15px',
                background: 'transparent',
                mainBkg: '#1b2230',
                primaryColor: '#1b2230',
                primaryTextColor: '#e6edf3',
                primaryBorderColor: '#00aaff',
                nodeBorder: '#00aaff',
                lineColor: '#58c4ff',
                edgeLabelBackground: '#15273a',
                clusterBkg: '#0d1117',
                clusterBorder: '#244a6e',
                titleColor: '#58c4ff',
                secondaryColor: '#161b22',
                tertiaryColor: '#0d1117'
            }
        });
        window.$docsify = {
            name: 'ATF Suite',
            loadSidebar: true,
            subMaxLevel: 0,
            auto2top: true,
            homepage: 'README.md',
            alias: {
                '/.*/_sidebar.md': '/_sidebar.md'
            },
            search: {
                placeholder: 'Search the docs',
                noData: 'Nothing found.',
                depth: 6
            },
            markdown: {
                renderer: {
                    code: function (code, lang) {
                        if (lang === 'mermaid') {
                            return '<div class="mermaid">' + code + '</div>';
                        }
                        return this.origin.code.apply(this, arguments);
                    }
                }
            },
            plugins: [
                function (hook) {
                    hook.doneEach(function () {
                        if (window.mermaid) {
                            mermaid.run({ querySelector: '.mermaid' });
                        }
                    });
                }
            ]
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-lua.min.js"></script>
</body>
</html>
